services:
  # 1. Backend Service (Django)
  - type: web
    name: income-insight-backend
    env: python
    plan: free
    region: ohio
    buildCommand: |
      pip install -r requirements.txt
      python backend/manage.py migrate
      python backend/ml_pipeline/train_model.py
    startCommand: gunicorn backend.myproject.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: DB_PASSWORD
        sync: false # Set this in Render dashboard if using external DB

  # 2. Frontend Service (React/Vite)
  - type: web
    name: income-insight-frontend
    env: static
    plan: free
    region: ohio
    buildCommand: |
      cd frontend
      npm install
      npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: income-insight-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
